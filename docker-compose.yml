services:
  # ── PostgreSQL 17 (Neon mock) ────────────────
  postgres:
    image: postgres:17-alpine
    container_name: klass-postgres
    environment:
      POSTGRES_DB: klass_backend
      POSTGRES_USER: klass
      POSTGRES_PASSWORD: klass_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U klass -d klass_backend"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis 7 (Upstash mock) ───────────────────
  redis:
    image: redis:7-alpine
    container_name: klass-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO (R2/S3 mock) ───────────────────────
  minio:
    image: minio/minio:latest
    container_name: klass-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: klass_minio
      MINIO_ROOT_PASSWORD: klass_minio_dev
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Rust Gateway ─────────────────────────────
  rust-gateway:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: klass-gateway
    ports:
      - "8080:8080"     # REST API
      - "50051:50051"   # gRPC
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgres://klass:klass_dev@postgres:5432/klass_backend
      RUST_LOG: info,klass_gateway=debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - .:/app
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/app/target
    working_dir: /app
    command: cargo watch -x "run"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  cargo_cache:
  target_cache:
